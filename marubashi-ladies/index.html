<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>提案資料 | ZOEN-TECH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-main: #009aa2;
      --color-main-dark: #007a80;
      --color-text: #333;
      --color-sub: #646464;
      --color-bg: #ffffff;
      --color-bg-section: #f8fafa;
      --color-border: #e0e0e0;
      --font-heading: 'Raleway', 'Noto Sans JP', sans-serif;
      --font-body: 'Noto Sans JP', sans-serif;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-bg-section);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #password-screen {
      background: var(--color-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    #password-screen .logo {
      margin-bottom: 24px;
    }
    #password-screen .logo img {
      height: 28px;
    }
    #password-screen h1 {
      font-family: var(--font-heading);
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 8px;
    }
    #password-screen p {
      font-size: 13px;
      color: var(--color-sub);
      margin-bottom: 24px;
    }
    #password-screen input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-size: 14px;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }
    #password-screen input:focus {
      border-color: var(--color-main);
    }
    #password-screen button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: var(--color-main);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background 0.2s;
    }
    #password-screen button:hover {
      background: var(--color-main-dark);
    }
    #error-msg {
      color: #c0392b;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

<div id="password-screen">
  <div class="logo"><img src="../assets/logo.png" alt="ZOEN-TECH株式会社"></div>
  <h1>提案資料の閲覧</h1>
  <p>パスワードを入力してください</p>
  <input type="password" id="pw-input" placeholder="パスワード" autofocus>
  <button onclick="checkPassword()">閲覧する</button>
  <p id="error-msg">パスワードが正しくありません</p>
</div>

<script>
  var hash = 'b74856fefd39fad2ecd4af4708e9f816e68438cc538369d770fc1f549c56eefd';

  async function sha256(str) {
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  }

  async function checkPassword() {
    var input = document.getElementById('pw-input').value;
    var inputHash = await sha256(input);
    if (inputHash === hash) {
      window.location.href = 'content.html';
    } else {
      document.getElementById('error-msg').style.display = 'block';
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });
</script>

</body>
</html>
